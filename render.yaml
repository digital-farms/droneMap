services:
  - type: web
    name: drone-monitor
    runtime: python
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: python run.py
    envVars:
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SCREENSHOT_BASE_URL
        sync: false
      - key: AUTO_START
        value: "true"
    autoDeploy: true
