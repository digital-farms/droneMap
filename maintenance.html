<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance | DroneMap</title>
    <style>
        :root {
            --bg-dark: #0f111a;
            --panel-bg: #1a1d2d;
            --text-primary: #ffffff;
            --text-secondary: #8b9bb4;
            --accent: #3b82f6;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0d14;
            color: var(--text-primary);
            overflow-x: hidden;
            overflow-y: auto;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        /* Animated background grid */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
        }

        /* Floating icons container */
        .floating-icons {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            overflow: hidden;
        }

        .floating-icon {
            position: absolute;
            opacity: 0.15;
            filter: drop-shadow(0 0 10px var(--warning));
        }

        .floating-icon.drone {
            animation: floatDrone 20s linear infinite;
        }

        .floating-icon.ballistic {
            animation: floatBallistic 15s linear infinite;
            filter: drop-shadow(0 0 10px var(--danger));
        }

        @keyframes floatDrone {
            0% {
                transform: translate(-100px, 50vh) rotate(0deg);
            }
            100% {
                transform: translate(calc(100vw + 100px), 30vh) rotate(10deg);
            }
        }

        @keyframes floatBallistic {
            0% {
                transform: translate(100vw, -100px) rotate(135deg);
            }
            100% {
                transform: translate(-100px, calc(100vh + 100px)) rotate(135deg);
            }
        }

        /* Main content */
        .content {
            text-align: center;
            z-index: 10;
            padding: 40px;
            background: rgba(26, 29, 45, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 0 60px rgba(59, 130, 246, 0.1);
            max-width: 600px;
            margin: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            animation: pulse 2s ease-in-out infinite;
            filter: drop-shadow(0 0 15px var(--warning));
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }
        }

        .brand {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--warning);
        }

        .subtitle {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* Progress bar */
        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(45, 55, 72, 0.5);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .progress-bar {
            height: 100%;
            width: 60%;
            background: linear-gradient(90deg, var(--accent), var(--success));
            border-radius: 3px;
            animation: progressPulse 2s ease-in-out infinite;
        }

        @keyframes progressPulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }

        /* Status info */
        .status-info {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            background: rgba(45, 55, 72, 0.3);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: blink 1.5s ease-in-out infinite;
        }

        .status-dot.active {
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        .status-dot.warning {
            background: var(--warning);
            box-shadow: 0 0 10px var(--warning);
        }

        @keyframes blink {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }

        .status-text {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
        }

        .footer p {
            font-size: 13px;
            color: var(--text-secondary);
            opacity: 0.6;
        }

        /* Animated icons in corners */
        .corner-icon {
            position: fixed;
            z-index: 5;
            opacity: 0.3;
        }

        .corner-icon.top-left {
            top: 50px;
            left: 50px;
            animation: orbitTopLeft 30s linear infinite;
        }

        .corner-icon.top-right {
            top: 50px;
            right: 50px;
            animation: orbitTopRight 25s linear infinite;
        }

        .corner-icon.bottom-left {
            bottom: 100px;
            left: 50px;
            animation: orbitBottomLeft 35s linear infinite;
        }

        .corner-icon.bottom-right {
            bottom: 100px;
            right: 50px;
            animation: orbitBottomRight 28s linear infinite;
        }

        @keyframes orbitTopLeft {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(30px, 20px) rotate(90deg); }
            50% { transform: translate(0, 40px) rotate(180deg); }
            75% { transform: translate(-30px, 20px) rotate(270deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        @keyframes orbitTopRight {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-20px, 30px) rotate(-90deg); }
            50% { transform: translate(-40px, 0) rotate(-180deg); }
            75% { transform: translate(-20px, -30px) rotate(-270deg); }
            100% { transform: translate(0, 0) rotate(-360deg); }
        }

        @keyframes orbitBottomLeft {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(25px, -25px) rotate(90deg); }
            50% { transform: translate(50px, 0) rotate(180deg); }
            75% { transform: translate(25px, 25px) rotate(270deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        @keyframes orbitBottomRight {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-25px, -20px) rotate(-90deg); }
            50% { transform: translate(0, -40px) rotate(-180deg); }
            75% { transform: translate(25px, -20px) rotate(-270deg); }
            100% { transform: translate(0, 0) rotate(-360deg); }
        }

        .corner-icon img {
            width: 50px;
            height: 50px;
            filter: drop-shadow(0 0 8px var(--accent));
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
                min-height: 100vh;
                justify-content: center;
            }

            .content {
                padding: 25px 20px;
                margin: 10px;
                max-width: 100%;
            }

            .logo {
                flex-direction: column;
                gap: 15px;
                margin-bottom: 25px;
            }

            .logo-icon {
                width: 50px;
                height: 50px;
            }

            .brand {
                font-size: 24px;
            }

            h1 {
                font-size: 20px;
                margin-bottom: 12px;
            }

            .subtitle {
                font-size: 14px;
                margin-bottom: 25px;
                line-height: 1.5;
            }

            .status-info {
                flex-direction: column;
                gap: 12px;
                width: 100%;
            }

            .status-item {
                padding: 10px 16px;
                justify-content: center;
            }

            .corner-icon {
                display: none;
            }

            .floating-icon {
                opacity: 0.08;
            }

            .floating-icon img {
                width: 40px !important;
                height: 40px !important;
            }

            .footer {
                position: relative;
                bottom: auto;
                left: auto;
                transform: none;
                margin-top: 30px;
                padding-bottom: 20px;
            }
        }

        @media (max-width: 400px) {
            .content {
                padding: 20px 15px;
            }

            .brand {
                font-size: 20px;
            }

            h1 {
                font-size: 18px;
            }

            .subtitle {
                font-size: 13px;
            }

            .status-text {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <!-- Background grid -->
    <div class="bg-grid"></div>

    <!-- Floating icons -->
    <div class="floating-icons">
        <div class="floating-icon drone" style="top: 20%; animation-delay: 0s;">
            <img src="icons/drone.svg" alt="" width="80" height="80">
        </div>
        <div class="floating-icon drone" style="top: 60%; animation-delay: -7s;">
            <img src="icons/drone.svg" alt="" width="60" height="60">
        </div>
        <div class="floating-icon drone" style="top: 80%; animation-delay: -14s;">
            <img src="icons/drone.svg" alt="" width="70" height="70">
        </div>
        <div class="floating-icon ballistic" style="left: 20%; animation-delay: 0s;">
            <img src="icons/ballistic.svg" alt="" width="60" height="60">
        </div>
        <div class="floating-icon ballistic" style="left: 50%; animation-delay: -5s;">
            <img src="icons/ballistic.svg" alt="" width="50" height="50">
        </div>
        <div class="floating-icon ballistic" style="left: 80%; animation-delay: -10s;">
            <img src="icons/ballistic.svg" alt="" width="55" height="55">
        </div>
    </div>

    <!-- Corner animated icons -->
    <div class="corner-icon top-left">
        <img src="icons/drone.svg" alt="">
    </div>
    <div class="corner-icon top-right">
        <img src="icons/ballistic.svg" alt="">
    </div>
    <div class="corner-icon bottom-left">
        <img src="icons/ballistic.svg" alt="">
    </div>
    <div class="corner-icon bottom-right">
        <img src="icons/drone.svg" alt="">
    </div>

    <!-- Main content -->
    <div class="container">
        <div class="content">
            <div class="logo">
                <img src="icons/drone.svg" alt="DroneMap" class="logo-icon">
                <span class="brand">AI THREAT MAP</span>
            </div>

            <h1>Under Maintenance</h1>
            <p class="subtitle">
                We're currently performing scheduled maintenance to improve our systems. 
                The service will be back online shortly.
            </p>

            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>

            <div class="status-info">
                <div class="status-item">
                    <div class="status-dot active"></div>
                    <span class="status-text">Systems Online</span>
                </div>
                <div class="status-item">
                    <div class="status-dot warning"></div>
                    <span class="status-text">Updating Services</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>Expected completion: Soon &bull; Thank you for your patience</p>
    </div>
</body>
</html>
